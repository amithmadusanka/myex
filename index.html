<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoolTech - Professional Invoice System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>CoolTech AC Solutions</h1>
        </header>

        <!-- Navigation Tabs -->
        <div class="tab-navigation">
            <button class="tab-btn active" onclick="openTab(event, 'settings-tab')">Business Info</button>
            <button class="tab-btn" onclick="openTab(event, 'create-tab')">Create Document</button>
            <button class="tab-btn" onclick="openTab(event, 'records-tab')">Saved Data</button>
        </div>

        <main>
            <!-- Tab 1: Business Settings -->
            <div id="settings-tab" class="tab-content active">
                <h2>Business Profile</h2>
                <div class="form-group">
                    <label>Company Logo</label>
                    <input type="file" id="logo-input" accept="image/*" style="display:none;">
                    <label for="logo-input" id="logo-label">
                        <div id="logo-preview">Upload Logo</div>
                    </label>
                </div>
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="comp-name" placeholder="Enter Company Name" value="CoolTech AC Solutions">
                </div>
                <button type="button" id="save-settings-btn" class="btn-primary" style="width:100%;">Save Profile</button>
            </div>

            <!-- Tab 2: Create Invoice/Quotation -->
            <div id="create-tab" class="tab-content">
                <h2>Generate Document</h2>
                <section class="doc-type-selector">
                    <label><input type="radio" name="doc-type" value="Quotation" checked> Quotation</label>
                    <label><input type="radio" name="doc-type" value="Invoice"> Invoice</label>
                </section>

                <fieldset>
                    <legend>Client Details</legend>
                    <input type="text" id="client-name" placeholder="Client Name">
                    <input type="text" id="client-phone" placeholder="Client Phone Number">
                    <input type="date" id="doc-date">
                </fieldset>

                <fieldset class="items-section">
                    <legend>Items & Services</legend>
                    <div id="items-list"></div>
                    <button type="button" id="add-item-btn" class="btn-secondary">+ Add Row</button>
                </fieldset>

                <div class="total-display">Total: LKR <span id="grand-total">0.00</span></div>

                <div class="action-buttons">
                    <button type="button" id="save-btn" class="btn-primary">Save Offline</button>
                    <button type="button" id="download-pdf-btn" class="btn-success">Download PDF</button>
                </div>
            </div>

            <!-- Tab 3: Saved Records -->
            <div id="records-tab" class="tab-content">
                <h2>Saved Documents</h2>
                <div id="saved-preview-container" class="saved-card">
                    <p id="no-data-msg">No recently saved documents found.</p>
                    <div id="saved-data-details" style="display:none;">
                        <p><strong>Last Saved:</strong> <span id="saved-doc-type"></span></p>
                        <p><strong>Client:</strong> <span id="saved-client-name"></span></p>
                        <p><strong>Amount:</strong> LKR <span id="saved-total-amount"></span></p>
                        <button type="button" id="load-saved-btn" class="btn-secondary" style="margin-top: 10px;">Reload to Editor</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Hidden PDF Template Layout -->
    <div id="pdf-template" style="display: none;">
        <div class="pdf-container">
            <div class="pdf-header">
                <img id="pdf-logo" src="" alt="Logo" style="max-height: 80px; display:none;">
                <h2 id="pdf-comp-name"></h2>
            </div>
            <hr>
            <h3 id="pdf-title" style="text-align: center; text-transform: uppercase; letter-spacing: 1px;"></h3>
            <div class="pdf-details">
                <p><strong>To:</strong> <span id="pdf-client"></span></p>
                <p><strong>Phone:</strong> <span id="pdf-phone"></span></p>
                <p><strong>Date:</strong> <span id="pdf-date"></span></p>
            </div>
            <table class="pdf-table">
                <thead>
                    <tr>
                        <th>Description</th>
                        <th style="width: 10%;">Qty</th>
                        <th style="width: 25%;">Unit Price</th>
                        <th style="width: 25%;">Total</th>
                    </tr>
                </thead>
                <tbody id="pdf-items"></tbody>
            </table>
            <div class="pdf-total">
                <h3>Grand Total: LKR <span id="pdf-total-val"></span></h3>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
